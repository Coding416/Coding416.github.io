<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Photography Portfolio Site</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="navbar">          
            <a href id="logo-container">Photos By Jim</a>
            <a href="#">Gallery</a>
            <a href="#">Services</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#" class="cta-button">View Gallery</a>
        </div>
        <div id="centered-hero">
            <div class="hero-content">
                <h1>Photos by Jim</h1>
            </div>
        </div>
        <div id="layout">
            <h3>Vertical Masonry Gallery (columns)</h3>
            <div class="vertical-masonry-gallery">
                <img src="images/urban-1a4h3_P3.jpg" alt="urban">
                <img src="images/urban-12w82_L1.jpg" alt="urban">
                <img src="images/urban-14h7y_P1.jpg" alt="urban">

                <img src="images/urban-18q12_P3.jpg" alt="urban">
                <img src="images/urban-19po9_S1.jpg" alt="urban">
                <img src="images/urban-9mb73_P2.jpg" alt="urban">
                <img src="images/urban-6s8s8_S2.jpg" alt="urban">
                <img src="images/urban-13n8n_L2.jpg" alt="urban">
            </div>
        </div>
        <div id="single-column">
            <!-- Flexbox Container -->
            <div id="card-container">

                <!-- Flexbox Item -->
                <div class="card">
                    <h3>About</h3>
                    <div id="section-1">
                        <a href="#" class="button simple">Learn More</a>
                    </div>
                </div>

                <!-- Flexbox Item -->
                <div class="card">
                    <h3>Services</h3>
                    <div id="section-1">
                        <a href="#" class="button simple">View Rates</a>
                    </div>
                </div>

                <!-- Flexbox Item -->
                <div class="card">
                    <h3>Contact</h3>
                    <div id="section-1">
                        <a href="#" class="button simple">Reach Out</a>
                    </div>
                </div>
            </div>
        </div>
